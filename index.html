<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Outreach Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .status-badge { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 glass">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 p-2 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                        </svg>
                    </div>
                    <h1 class="text-xl font-bold text-slate-800">Outreach Pro</h1>
                </div>
                <div class="flex items-center gap-4">
                    <button id="resetBtn" class="text-xs text-red-500 hover:underline font-medium">Clear All Data</button>
                    <label class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium cursor-pointer transition flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                        Upload CSV
                        <input type="file" id="csvUpload" accept=".csv" class="hidden">
                    </label>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
        
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                <p class="text-sm font-medium text-slate-500 mb-1">Total Contacts</p>
                <h3 id="totalCount" class="text-2xl font-bold text-slate-900">0</h3>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                <p class="text-sm font-medium text-slate-500 mb-1">Messaged</p>
                <h3 id="messagedCount" class="text-2xl font-bold text-green-600">0</h3>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                <p class="text-sm font-medium text-slate-500 mb-1">Remaining</p>
                <h3 id="pendingCount" class="text-2xl font-bold text-orange-500">0</h3>
            </div>
        </div>

        <!-- Template Editor -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm mb-8 overflow-hidden">
            <button id="toggleSettings" class="w-full px-6 py-4 flex justify-between items-center hover:bg-slate-50 transition">
                <span class="font-semibold text-slate-700 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    Message Templates
                </span>
                <svg id="settingsArrow" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            <div id="settingsPanel" class="hidden px-6 pb-6 border-t border-slate-100 mt-2 pt-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">WhatsApp / SMS Content</label>
                        <textarea id="messageTemplate" class="w-full h-32 p-3 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="Hello {name}, I saw your business {business_name} in {address}..."></textarea>
                        <p class="text-[10px] text-slate-400 mt-2">Available tags: {name}, {business_name}, {niche}, {address}</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Preview</h4>
                        <div id="messagePreview" class="text-sm text-slate-600 italic">No template set</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Search & Filter -->
        <div class="mb-6 flex flex-col md:flex-row gap-4">
            <div class="relative flex-grow">
                <input type="text" id="searchInput" placeholder="Search by name, niche, or address..." class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 absolute left-3 top-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <select id="statusFilter" class="px-4 py-2 border border-slate-200 rounded-lg outline-none text-sm bg-white">
                <option value="all">All Status</option>
                <option value="pending">Pending</option>
                <option value="messaged">Messaged</option>
            </select>
        </div>

        <!-- Data Table -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Business Info</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Niche</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Address</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Contact Status</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        <!-- Rows will be injected here -->
                        <tr>
                            <td colspan="5" class="px-6 py-12 text-center text-slate-400 italic">
                                No data uploaded yet. Please upload your CSV file to begin.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- App Persistence Manager Script -->
    <script>
        let businessData = [];
        let outreachLogs = JSON.parse(localStorage.getItem('outreach_logs') || '{}');
        let appTemplate = localStorage.getItem('outreach_template') || "Hello {business_name}, I found your {niche} business at {address}. I'd love to discuss a collaboration!";

        const csvUpload = document.getElementById('csvUpload');
        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const statusFilter = document.getElementById('statusFilter');
        const messageTemplate = document.getElementById('messageTemplate');
        const messagePreview = document.getElementById('messagePreview');
        const toggleSettings = document.getElementById('toggleSettings');
        const settingsPanel = document.getElementById('settingsPanel');
        const settingsArrow = document.getElementById('settingsArrow');
        const totalCount = document.getElementById('totalCount');
        const messagedCount = document.getElementById('messagedCount');
        const pendingCount = document.getElementById('pendingCount');
        const resetBtn = document.getElementById('resetBtn');

        // Init
        messageTemplate.value = appTemplate;
        updatePreview();

        // Load existing data if available
        const cachedData = localStorage.getItem('business_data_cache');
        if (cachedData) {
            businessData = JSON.parse(cachedData);
            renderTable();
        }

        // CSV Upload Handler
        csvUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    businessData = results.data;
                    localStorage.setItem('business_data_cache', JSON.stringify(businessData));
                    renderTable();
                }
            });
        });

        // Template Management
        messageTemplate.addEventListener('input', () => {
            appTemplate = messageTemplate.value;
            localStorage.setItem('outreach_template', appTemplate);
            updatePreview();
        });

        function updatePreview() {
            messagePreview.innerText = formatMessage(appTemplate, {
                business_name: "Business Name",
                niche: "Niche",
                address: "Ibadan, Nigeria"
            });
        }

        function formatMessage(template, item) {
            return template
                .replace(/{business_name}/g, item.business_name || '')
                .replace(/{name}/g, item.business_name || '')
                .replace(/{niche}/g, item.niche || '')
                .replace(/{address}/g, item.address || '');
        }

        // Phone cleaning
        function cleanPhone(phone) {
            if (!phone) return "";
            // Remove non-numeric characters
            let cleaned = phone.replace(/\D/g, '');
            // Simple Nigerian logic: if starts with 0 and 11 digits, change to 234
            if (cleaned.startsWith('0') && cleaned.length === 11) {
                cleaned = '234' + cleaned.substring(1);
            }
            // If already looks like a valid int number, keep it
            return cleaned;
        }

        // Action Handlers
        function markAsMessaged(phone) {
            const now = new Date();
            outreachLogs[phone] = {
                timestamp: now.toLocaleString(),
                date: now.toISOString()
            };
            localStorage.setItem('outreach_logs', JSON.stringify(outreachLogs));
            renderTable();
        }

        // Search & Filter
        searchInput.addEventListener('input', renderTable);
        statusFilter.addEventListener('change', renderTable);

        function renderTable() {
            const query = searchInput.value.toLowerCase();
            const filterValue = statusFilter.value;
            
            const filtered = businessData.filter(item => {
                const searchMatch = 
                    (item.business_name?.toLowerCase() || "").includes(query) ||
                    (item.niche?.toLowerCase() || "").includes(query) ||
                    (item.address?.toLowerCase() || "").includes(query);
                
                const phone = cleanPhone(item.phone);
                const isMessaged = !!outreachLogs[phone];
                
                if (filterValue === 'pending') return searchMatch && !isMessaged;
                if (filterValue === 'messaged') return searchMatch && isMessaged;
                return searchMatch;
            });

            // Update Counts
            const total = businessData.length;
            const messaged = Object.keys(outreachLogs).length;
            totalCount.innerText = total;
            messagedCount.innerText = messaged;
            pendingCount.innerText = total - messaged;

            if (filtered.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-slate-400 italic">No matching businesses found.</td></tr>`;
                return;
            }

            tableBody.innerHTML = filtered.map((item, index) => {
                const phone = cleanPhone(item.phone);
                const log = outreachLogs[phone];
                const isMessaged = !!log;
                const message = encodeURIComponent(formatMessage(appTemplate, item));

                return `
                    <tr class="hover:bg-slate-50/50 transition">
                        <td class="px-6 py-4">
                            <div class="font-semibold text-slate-800">${item.business_name || 'Unknown Business'}</div>
                            <div class="text-xs text-slate-500">${item.phone || 'No phone'}</div>
                        </td>
                        <td class="px-6 py-4 text-sm text-slate-600">
                            <span class="bg-blue-50 text-blue-700 px-2 py-1 rounded text-[11px] font-medium uppercase tracking-wider">${item.niche || 'General'}</span>
                        </td>
                        <td class="px-6 py-4 text-sm text-slate-500 max-w-xs truncate">
                            ${item.address || '—'}
                        </td>
                        <td class="px-6 py-4">
                            ${isMessaged 
                                ? `<div class="flex flex-col">
                                    <span class="text-green-600 flex items-center gap-1 text-sm font-medium">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                                        </svg>
                                        Messaged
                                    </span>
                                    <span class="text-[10px] text-slate-400 ml-5">${log.timestamp}</span>
                                   </div>`
                                : `<span class="text-slate-300 text-sm italic">Not contacted</span>`
                            }
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex justify-end gap-2">
                                <a href="https://wa.me/${phone}?text=${message}" 
                                   target="_blank"
                                   onclick="markAsMessaged('${phone}')"
                                   class="p-2 rounded-lg bg-emerald-50 text-emerald-600 hover:bg-emerald-600 hover:text-white transition shadow-sm"
                                   title="Message on WhatsApp">
                                   <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.94 3.675 1.439 5.662 1.439h.05c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                                </a>
                                <a href="sms:${phone}?body=${message}" 
                                   onclick="markAsMessaged('${phone}')"
                                   class="p-2 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition shadow-sm"
                                   title="Send SMS">
                                   <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                                </a>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Settings Toggle
        toggleSettings.addEventListener('click', () => {
            settingsPanel.classList.toggle('hidden');
            settingsArrow.classList.toggle('rotate-180');
        });

        // Reset functionality
        resetBtn.addEventListener('click', () => {
            if (confirm("Are you sure? This will delete all uploaded data and messaging logs.")) {
                localStorage.clear();
                window.location.reload();
            }
        });

    </script>
</body>
</html>
